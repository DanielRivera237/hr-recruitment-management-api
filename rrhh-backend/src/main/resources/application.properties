spring.application.name=rrhh-backend

# Load environment variables from .env during local development
spring.config.import=optional:file:.env[.properties]

# PostgreSQL configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT configuration
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION_TIME:86400000}

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Configurable port for Docker and cloud deployment
server.port=${PORT:8080}

# Proxy headers support for cloud deployment
server.forward-headers-strategy=framework