spring.application.name=rrhh-backend-test

# H2 database for automated tests
spring.datasource.url=jdbc:h2:mem:rrhh_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT test configuration
security.jwt.secret-key=ClaveJwtDePruebaSeguraConMasDeTreintaYDosCaracteres2026
security.jwt.expiration-time=86400000

# Disable unnecessary server configuration during tests
server.port=0